name: could-update-md

on:
  schedule:
    - cron: '0 6 * * *'  # Daily 06:00 UTC = 18:00 NZST
  workflow_dispatch:
    inputs:
      quarter_override:
        description: 'Override quarter (e.g. 2026Q3)'
        type: string
        required: false
      target:
        description: 'Single target to run (e.g. ts-back). Leave empty to run all.'
        type: string
        required: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.load.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Load targets
        id: load
        run: |
          if [ -n "${{ inputs.target }}" ]; then
            matrix=$(jq -c '[.[] | select(.target == "${{ inputs.target }}")] | map({target: .target, outputRepo: .outputRepo, tokenSecret: .tokenSecret})' targets.json)
          else
            matrix=$(jq -c '[.[] | {target: .target, outputRepo: .outputRepo, tokenSecret: .tokenSecret}]' targets.json)
          fi
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "Targets: $matrix"

  run:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ matrix.outputRepo }}
          token: ${{ secrets[matrix.tokenSecret] }}

      - name: Compute quarter
        id: quarter
        run: |
          if [ -n "${{ inputs.quarter_override }}" ]; then
            QUARTER="${{ inputs.quarter_override }}"
          else
            YEAR=$(date +%Y)
            MONTH=$(date +%-m)
            Q=$(( (MONTH - 1) / 3 + 1 ))
            QUARTER="${YEAR}Q${Q}"
          fi
          echo "value=$QUARTER" >> $GITHUB_OUTPUT
          echo "Quarter: $QUARTER"

      - name: Discover categories from could/
        id: categories
        run: |
          QUARTER="${{ steps.quarter.outputs.value }}"
          # Find categories from any existing quarter's could/ files
          CATS=$(ls could/ 2>/dev/null | grep -oE '^[A-Z]+' | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "cats=$CATS" >> $GITHUB_OUTPUT
          echo "Categories: $CATS"

      - name: Create quarterly files
        id: create
        env:
          QUARTER: ${{ steps.quarter.outputs.value }}
          CATEGORIES: ${{ steps.categories.outputs.cats }}
        run: |
          CREATED=false
          ANCHOR="####### <!-- ANCHOR MARKER - ADD ALL NEW ASSET ENTRIES DIRECTLY BELOW THIS LINE, NEVER DELETE OR EDIT PREVIOUS ASSET ENTRIES-->"
          IANCHOR="####### <!-- ANCHOR MARKER - ADD ALL NEW ISSUE ENTRIES DIRECTLY BELOW THIS LINE, NEVER DELETE OR EDIT PREVIOUS ISSUE ENTRIES-->"
          ASSET_HEADER="$(printf 'ASSET LOG\nINSTRUCTION FOR AI MODEL:\n\nALWAYS ADD NEW ASSET ENTRIES AT THE TOP, DIRECTLY BELOW THIS HEADER.\n\nNEVER DELETE OR EDIT PREVIOUS ASSET ENTRIES.\n\nREQUIRED FORMAT FOR EACH ASSET ENTRY:\n\n## ASSET:{NAME OF ENVIRONMENT} {YYYY-MM-DD HH:MM} → {CONTENT}\n\n%s' "$ANCHOR")"
          ISSUE_HEADER="$(printf 'ISSUE LOG\nINSTRUCTION FOR AI MODEL:\n\nALWAYS ADD NEW ISSUE ENTRIES AT THE TOP, DIRECTLY BELOW THIS HEADER.\n\nNEVER DELETE OR EDIT PREVIOUS ISSUE ENTRIES.\n\nREQUIRED FORMAT FOR EACH ISSUE ENTRY:\n\n## ISSUE:{NAME OF ENVIRONMENT} {YYYY-MM-DD HH:MM} → {CONTENT}\n\n%s' "$IANCHOR")"

          create_file() {
            local path="$1" content="$2"
            if [ ! -f "$path" ]; then
              mkdir -p "$(dirname "$path")"
              printf "%s" "$content" > "$path"
              echo "✅ Created: $path"
              CREATED=true
            else
              echo "— Exists:  $path"
            fi
          }

          create_file "ASSET-${QUARTER}.md" "$ASSET_HEADER"
          create_file "ISSUE-${QUARTER}.md" "$ISSUE_HEADER"

          IFS=',' read -ra CATS <<< "$CATEGORIES"
          for CAT in "${CATS[@]}"; do
            CAT=$(echo "$CAT" | xargs)
            [ -z "$CAT" ] && continue
            create_file "could/${CAT}-ASSET-${QUARTER}.md" "$ASSET_HEADER"
            create_file "could/${CAT}-ISSUE-${QUARTER}.md" "$ISSUE_HEADER"
          done

          mkdir -p would
          create_file "would/ISSUE-${QUARTER}.md" "$ISSUE_HEADER"
          create_file "would/ASSET-${QUARTER}.md" "$ASSET_HEADER"

          echo "created=$CREATED" >> $GITHUB_OUTPUT

      - name: Commit new files
        if: steps.create.outputs.created == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "could-update-title: init ${{ steps.quarter.outputs.value }} files — ${{ matrix.target }}"
          git push

      - name: Trigger toigroup-listener
        id: trigger
        run: |
          BODY=$(jq -n --arg t "${{ matrix.target }}" --arg q "${{ inputs.quarter_override }}" '{"target": $t, "quarter_override": $q}')
          STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" -X POST https://local.toigroup.co.nz/could/could-update-md -H "x-secret: ${{ secrets.TOIGROUP_SECRET }}" -H "X-Token: ${{ secrets.MACMINI_TRIGGER_TOKEN }}" -H "Content-Type: application/json" --max-time 30 -d "$BODY")
          echo "http_code=$STATUS" >> $GITHUB_OUTPUT
          cat /tmp/response.txt
          [ "$STATUS" = "202" ] || exit 1

      - name: Log run outcome
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATUS: ${{ job.status }}
          HTTP_CODE: ${{ steps.trigger.outputs.http_code }}
          TARGET: ${{ matrix.target }}
        run: |
          TS=$(date -u '+%Y-%m-%d %H:%M UTC')
          NOTE=""
          if [ "$HTTP_CODE" = "000" ]; then NOTE="curl timeout or tunnel unreachable"; fi
          if [ "$HTTP_CODE" = "530" ]; then NOTE="Cloudflare error 530 — tunnel unreachable, Mac Mini likely off"; fi
          if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then NOTE="auth rejected by listener"; fi
          if [ "$HTTP_CODE" = "202" ]; then NOTE="listener accepted — verify write via pm2 logs"; fi
          LINE="${TS} | ${TARGET} | ${STATUS} | ${HTTP_CODE:-???} | ${NOTE}"
          CURRENT=$(gh api repos/jayreck996/ts-repo/contents/would/TRIGGER-LOG.log --jq '{sha: .sha, content: .content}' 2>/dev/null || echo '{"sha":"","content":""}')
          SHA=$(echo "$CURRENT" | jq -r '.sha')
          LOGBODY=$(echo "$CURRENT" | jq -r '.content' | base64 -d 2>/dev/null || echo "")
          UPDATED=$(echo "$LINE"; echo "$LOGBODY")
          ENCODED=$(echo "$UPDATED" | base64 -w 0)
          if [ -n "$SHA" ] && [ "$SHA" != "null" ]; then
            gh api --method PUT repos/jayreck996/ts-repo/contents/would/TRIGGER-LOG.log -f message="could-update-md: log ${TS} — ${TARGET}" -f sha="$SHA" -f content="$ENCODED"
          else
            gh api --method PUT repos/jayreck996/ts-repo/contents/would/TRIGGER-LOG.log -f message="could-update-md: log ${TS} — ${TARGET}" -f content="$ENCODED"
          fi
